name: rescue_app
description: Rescue Mobile App - Emergency Response Application

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Firebase core
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Phone auth
  intl_phone_field: ^3.2.0

  # Image picking
  image_picker: ^1.1.2

  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Google Maps for map picker
  google_maps_flutter: ^2.2.0

  # URL launcher (for phone calls)
  url_launcher: ^6.3.1

  # Local storage
  shared_preferences: ^2.3.3

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
